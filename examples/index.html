<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValiNum Demo - RDC (v1.0.2)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; text-align: center; }
        p { color: #666; text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        .result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; background: #fafafa; border: 1px solid #eee; }
        .badge-container { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .badge { font-weight: bold; padding: 5px 12px; border-radius: 20px; color: white; font-size: 0.8rem; text-transform: uppercase; }
        
        /* Couleurs Opérateurs */
        .Vodacom { background-color: #e60000; box-shadow: 0 2px 6px rgba(230, 0, 0, 0.2); }
        .Orange { background-color: #ff6600; box-shadow: 0 2px 6px rgba(255, 102, 0, 0.2); }
        .Airtel { background-color: #ff0000; box-shadow: 0 2px 6px rgba(255, 0, 0, 0.2); }
        .Africell { background-color: #000000; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2); }
        .Unknown { background-color: #777; }

        /* Types de numéros */
        .type-badge { background-color: #007bff; color: white; }
        
        .status { font-size: 0.95rem; margin-top: 5px; display: block; }
        .error { color: #d9534f; font-weight: 500; }
        .success { color: #5cb85c; font-weight: bold; }
        .info { color: #f0ad4e; }
        
        .formatted { font-family: monospace; font-size: 0.85rem; color: #666; margin-top: 12px; display: block; border-top: 1px solid #eee; padding-top: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h1>ValiNum RDC</h1>
    <p>Test des exceptions : Abonnés, Services & USSD (v1.0.2)</p>
    
    <input type="text" id="phoneInput" placeholder="Ex: 081234567, *1122# ou 1111" autocomplete="off">
    
    <div id="resultArea" class="result">
        <div class="badge-container">
            <div id="operatorBadge" class="badge"></div>
            <div id="typeBadge" class="badge type-badge"></div>
        </div>
        <span id="statusMessage" class="status"></span>
        <span id="formattedNumber" class="formatted"></span>
    </div>
</div>

<script src="../dist/valinum.js"></script>

<script>
    const input = document.getElementById('phoneInput');
    const resultArea = document.getElementById('resultArea');
    const operatorBadge = document.getElementById('operatorBadge');
    const typeBadge = document.getElementById('typeBadge');
    const statusMessage = document.getElementById('statusMessage');
    const formattedNumber = document.getElementById('formattedNumber');

    input.addEventListener('input', (e) => {
        const val = e.target.value;

        // On autorise les chiffres, +, -, parenthèses, espaces ainsi que * et # pour les USSD
        const cleanInput = val.replace(/[^\d+ \-()*#]/g, '');
        if (val !== cleanInput) {
            e.target.value = cleanInput;
        }

        if (cleanInput.trim().length > 0) {
            // Appel de ValiNum v1.0.2
            const res = ValiNum.validateDRC(cleanInput);
            
            resultArea.style.display = 'block';
            
            // 1. Gestion du badge opérateur
            if (res.operator) {
                operatorBadge.innerText = res.operator;
                operatorBadge.className = 'badge ' + res.operator;
                operatorBadge.style.display = 'inline-block';
            } else {
                operatorBadge.innerText = 'Inconnu';
                operatorBadge.className = 'badge Unknown';
                operatorBadge.style.display = res.isServiceNumber ? 'none' : 'inline-block';
            }

            // 2. Gestion du badge de type de numéro
            if (res.isServiceNumber) {
                typeBadge.innerText = res.serviceType === 'USSD' ? 'Menu USSD / Mobile Money' : 'Numéro Court';
                typeBadge.style.display = 'inline-block';
            } else {
                typeBadge.style.display = 'none';
            }

            // 3. Messages de statut et couleurs de bordure
            if (res.isValid) {
                statusMessage.innerText = "✓ Numéro d'abonné valide";
                statusMessage.className = "status success";
                input.style.borderColor = "#5cb85c";
            } else {
                statusMessage.innerText = res.error || "Saisie en cours...";
                
                if (res.isServiceNumber) {
                    statusMessage.className = "status info";
                    input.style.borderColor = "#f0ad4e"; // Orange pour les numéros de services interceptés
                } else {
                    statusMessage.className = res.error ? "status error" : "status info";
                    input.style.borderColor = res.operator ? "#f0ad4e" : "#d9534f";
                }
            }

            // 4. Affichage du formatage
            formattedNumber.innerText = res.serviceType === 'USSD' 
                ? "Code USSD détecté : " + res.formatted 
                : "Format : " + res.formatted;

        } else {
            resultArea.style.display = 'none';
            input.style.borderColor = "#ddd";
        }
    });
</script>

</body>
</html>
